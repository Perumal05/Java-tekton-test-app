name: Spring Boot CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Source
        uses: actions/checkout@v4

      # 2. Cache Maven
      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # 3. Setup Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # -------------------------------
      # SAST - CodeQL
      # -------------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL + Tests
        run: mvn clean verify

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # -------------------------------
      # Verify Artifact
      # -------------------------------
      - name: Verify Build Artifact
        run: |
          ls target/*.jar || (echo "❌ No JAR found" && exit 1)

      # -------------------------------
      # Dockerfile Generation
      # -------------------------------
      - name: Generate Dockerfile
        run: |
          #!/bin/sh
          set -e

          BUILD_TOOL=""
          ARTIFACT_PATH=""
          ARTIFACT_TYPE="jar"
          JAVA_VERSION="21"
          PORT="8080"

          if [ -f pom.xml ]; then
            ARTIFACT_PATH="target"
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            ARTIFACT_PATH="build/libs"
          else
            echo "❌ Unknown Java project"
            exit 1
          fi

          if ls $ARTIFACT_PATH/*.war 1> /dev/null 2>&1; then
            ARTIFACT_TYPE="war"
          fi

          echo "PORT=$PORT" >> $GITHUB_ENV

          if [ -f Dockerfile ]; then
            echo "Dockerfile exists, skipping"
            exit 0
          fi

          if [ "$ARTIFACT_TYPE" = "war" ]; then
          cat <<EOF > Dockerfile
          FROM tomcat:10.1-jre${JAVA_VERSION}
          COPY ${ARTIFACT_PATH}/*.war /usr/local/tomcat/webapps/app.war
          EXPOSE ${PORT}
          CMD ["catalina.sh","run"]
          EOF
          else
          cat <<EOF > Dockerfile
          FROM eclipse-temurin:${JAVA_VERSION}-jre-alpine
          RUN apk add --no-cache curl
          WORKDIR /app
          COPY ${ARTIFACT_PATH}/*.jar /app/app.jar
          EXPOSE ${PORT}
          ENTRYPOINT ["java","-jar","/app/app.jar"]
          EOF
          fi

      # -------------------------------
      # ✅ FIX: Normalize repo name
      # -------------------------------
      - name: Set lowercase image name
        run: |
          echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # -------------------------------
      # Docker Build (FIXED)
      # -------------------------------
      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/$IMAGE_REPO:${{ github.sha }} .

      # -------------------------------
      # Image Scan (FIXED)
      # -------------------------------
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
          format: 'table'
          severity: 'UNKNOWN'
          exit-code: '1'
          ignore-unfixed: true

  push-image:
    needs: build-test-scan
    runs-on: ubuntu-latest

    steps:
      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ FIX: regenerate lowercase (new job = new env)
      - name: Set lowercase image name
        run: |
          echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Push Image (FIXED)
      - name: Push Docker Image
        run: |
          docker push $REGISTRY/$IMAGE_REPO:${{ github.sha }}
