name: Spring Boot CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Cache Maven
      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # Java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # CodeQL
      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - run: mvn clean verify

      - uses: github/codeql-action/analyze@v3

      # Verify artifact
      - run: ls target/*.jar

      # Normalize repo name
      - name: Set lowercase image name
        run: |
          echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Generate Dockerfile (shortened for clarity)
      - name: Generate Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM eclipse-temurin:21-jre-alpine
          RUN apk add --no-cache curl
          WORKDIR /app
          COPY target/*.jar app.jar
          EXPOSE 8080
          ENTRYPOINT ["java","-jar","/app/app.jar"]
          EOF

      # Build image
      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/$IMAGE_REPO:${{ github.sha }} .

      # Scan image
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      # Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Push (NOW WORKS)
      - name: Push Docker Image
        run: |
          docker push $REGISTRY/$IMAGE_REPO:${{ github.sha }}
