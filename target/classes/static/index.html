<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spring Boot Animation</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f0f8ff;
      font-family: Arial, sans-serif;
    }

    h1 {
      color: #4caf50;
      margin-bottom: 50px;
      animation: fadeIn 2s ease forwards;
    }

    .spring-boot-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #4caf50;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 24px;
      margin-bottom: 30px;
      animation: bounce 2s infinite;
    }

    .loader {
      display: flex;
      gap: 15px;
    }

    .loader div {
      width: 20px;
      height: 20px;
      background: #4caf50;
      border-radius: 50%;
      animation: bounceLoader 0.6s infinite alternate;
    }

    .loader div:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loader div:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    @keyframes bounceLoader {
      0% {
        transform: scale(0.5);
        opacity: 0.5;
      }
      100% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(-20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <h1>Spring Boot Application</h1>
  <div class="spring-boot-logo">SB</div>
  <div class="loader">
    <div></div>
    <div></div>
    <div></div>
  </div>
</body>
</html>
